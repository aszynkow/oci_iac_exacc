schemaVersion: 1.1.0
version: "0.0.1"
locale: en
title: OCI IaC ExaCC
description: Terraform scaffold for OCI Exadata Cloud@Customer automation.

variableGroups:
  - title: OCI Target
    variables:
      - tenancy_ocid
      - compartment_ocid
      - exacs_compartment_id
      - region

  - title: Exadata Infrastructure
    variables:
      - cloud_exadata_infrastructure_id
      - vm_cluster_subnet_id
      - vm_cluster_backup_subnet_id

  - title: VM Cluster
    variables:
      - vm_cluster_display_name
      - vm_cluster_hostname
      - vm_cluster_cpu_core_count
      - vm_cluster_data_storage_size_in_tbs
      - vm_cluster_db_node_storage_size_in_gbs
      - vm_cluster_memory_size_in_gbs
      - vm_cluster_gi_version
      - vm_cluster_license_model
      - vm_cluster_is_local_backup_enabled
      - vm_cluster_is_sparse_diskgroup_enabled
      - vm_cluster_ssh_public_keys

  - title: Tags
    variables:
      - defined_tags
      - freeform_tags

variables:
  tenancy_ocid:
    type: oci:identity:tenancy:id
    required: true
    title: Tenancy OCID
    description: OCI tenancy OCID.

  compartment_ocid:
    type: oci:identity:compartment:id
    required: true
    title: Default Compartment OCID
    description: Default compartment where ExaCC resources will be managed.

  exacs_compartment_id:
    type: oci:identity:compartment:id
    required: true
    title: ExaCC Compartment OCID
    description: Compartment used for the VM cluster and DB server lookup.

  region:
    type: string
    required: true
    title: Region
    description: OCI region identifier.

  cloud_exadata_infrastructure_id:
    type: string
    required: true
    title: Cloud Exadata Infrastructure OCID
    description: Cloud Exadata infrastructure OCID for the VM cluster.

  vm_cluster_subnet_id:
    type: oci:core:subnet:id
    required: true
    title: Client Subnet OCID
    description: Client subnet OCID for the ExaCC VM cluster.
    default: ocid1.subnet.oc1.ap-sydney-1.aaaaaaaahyaolzmux7eiy7ihe2tgyconfclthowvo2426xmvvdbkmoee64nq

  vm_cluster_backup_subnet_id:
    type: oci:core:subnet:id
    required: true
    title: Backup Subnet OCID
    description: Backup subnet OCID for the ExaCC VM cluster.
    default: ocid1.subnet.oc1.ap-sydney-1.aaaaaaaavlyovx3jevo5w3h2abqhn272bmazbusywbrqggwrg47hvx325ofa

  vm_cluster_display_name:
    type: string
    required: true
    title: Display Name
    description: Display name for the ExaCC VM cluster.
    default: tmptest1

  vm_cluster_hostname:
    type: string
    required: true
    title: Hostname
    description: Hostname prefix for the ExaCC VM cluster.
    default: tmptest1

  vm_cluster_cpu_core_count:
    type: number
    required: true
    title: CPU Core Count
    description: Number of CPU cores enabled for the ExaCC VM cluster.
    default: 4

  vm_cluster_data_storage_size_in_tbs:
    type: number
    required: true
    title: Data Storage Size In TBs
    description: Data storage size in TBs for the ExaCC VM cluster.
    default: 3

  vm_cluster_db_node_storage_size_in_gbs:
    type: number
    required: true
    title: DB Node Storage Size In GBs
    description: Database node storage size in GBs for the ExaCC VM cluster.
    default: 160

  vm_cluster_memory_size_in_gbs:
    type: number
    required: true
    title: Memory Size In GBs
    description: Memory size in GBs for the ExaCC VM cluster.
    default: 60

  vm_cluster_gi_version:
    type: string
    required: true
    title: Grid Infrastructure Version
    description: Grid Infrastructure version for the ExaCC VM cluster.
    default: 19.0.0.0

  vm_cluster_license_model:
    type: enum
    required: true
    title: License Model
    description: Oracle Database license model for the ExaCC VM cluster.
    default: BRING_YOUR_OWN_LICENSE
    enum:
      - BRING_YOUR_OWN_LICENSE
      - LICENSE_INCLUDED

  vm_cluster_is_local_backup_enabled:
    type: boolean
    required: true
    title: Enable Local Backup
    description: Whether local backup is enabled for the ExaCC VM cluster.
    default: false

  vm_cluster_is_sparse_diskgroup_enabled:
    type: boolean
    required: true
    title: Enable Sparse Disk Group
    description: Whether sparse disk groups are enabled for the ExaCC VM cluster.
    default: false

  vm_cluster_ssh_public_keys:
    type: array
    required: true
    title: SSH Public Keys
    description: SSH public keys authorized for the ExaCC VM cluster.
    default:
      - ssh-rsa  jason.grogan@dhcp-10-191-135-197.vpn.oracle.com
    items:
      type: string

  defined_tags:
    type: map
    required: false
    title: Defined Tags
    description: Defined tags to apply to supported OCI resources.
    default: {}

  freeform_tags:
    type: map
    required: false
    title: Freeform Tags
    description: Freeform tags to apply to supported OCI resources.
    default: {}
